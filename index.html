  {month:"2026-02",vendor:"Evergreen - Higley & Warner JV LLC",category:"NET PAYMENTS TO GC & STORE REIMBURSEMENTS",amount:307482.37,projected:false,invoice_date:"2026-02-19",date_paid:"2026-02-19"},
  {month:"2026-02",vendor:"A.R. Mays Construction",category:"NET PAYMENTS TO GC & STORE REIMBURSEMENTS",amount:-138395.66,projected:false,invoice_date:"2026-02-20",date_paid:"2026-02-20"},
  {month:"2026-02",vendor:"Evergreen - Higley & Warner JV LLC",category:"NET PAYMENTS TO GC & STORE REIMBURSEMENTS",amount:106819.63,projected:false,invoice_date:"2026-02-25",date_paid:"2026-02-27"},
  {month:"2026-02",vendor:"Capitalized Labor",category:"OTHER PREOPENING COSTS",amount:2388.49,projected:false,invoice_date:"2026-02-28",date_paid:"2026-02-28"},
  {month:"2026-03",vendor:"UES Professional Solutions 30, LLC",category:"CONSULTANTS",amount:2890,projected:true,invoice_date:"2026-02-28",date_paid:null},
  {month:"2026-03",vendor:"Evergreen - Higley & Warner JV LLC",category:"NET PAYMENTS TO GC & STORE REIMBURSEMENTS",amount:225957.2,projected:false,invoice_date:"2026-02-28",date_paid:"2026-03-13"},
  {month:"2026-03",vendor:"Dry Utility Services",category:"UTILITIES",amount:2362,projected:false,invoice_date:"2025-12-12",date_paid:"2026-03-06"},
  {month:"2026-03",vendor:"STORE Capital Corporation",category:"STORE Capital RENT PAYMENTS",amount:20293.94,projected:false,invoice_date:"2026-03-01",date_paid:"2026-03-02"},
  {month:"2026-03",vendor:"Adaptive Architects, Inc.",category:"ARCHITECT",amount:4175,projected:false,invoice_date:"2026-03-08",date_paid:"2026-03-13"},
  {month:"2026-04",vendor:"Dry Utility Services",category:"UTILITIES",amount:1890,projected:true,invoice_date:"2026-03-11",date_paid:null},
  {month:"2026-04",vendor:"Caruso Turley Scott, Inc",category:"CONSULTANTS",amount:3406.98,projected:true,invoice_date:"2026-03-13",date_paid:null},
];

const normCat = c => { const u=c.toUpperCase(); return (u==='ARCHITECH'||u==='ARCHITECT')?'ARCHITECT':c; };
const rows = RAW.map(r=>({...r, category: normCat(r.category)}));

const GC_CAT      = "NET PAYMENTS TO GC & STORE REIMBURSEMENTS";
const STORE_CAT   = "STORE Capital RENT PAYMENTS";
const GROUPED     = new Set([GC_CAT, STORE_CAT]);
const GC_LABEL    = "Net Payments to GC & STORE Reimbursements";
const STORE_LABEL = "STORE Capital Rent Payments";
const GRPSUB_LBL  = "Construction & Lease Subtotal";
const MNAMES      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QTR         = m => 'Q'+Math.ceil(+m.split('-')[1]/3);

const fmt = v => {
  if (v===0||v===null||v===undefined) return '—';
  const abs=Math.abs(v);
  let s = abs>=1e6?'$'+(abs/1e6).toFixed(2)+'M' : abs>=1000?'$'+Math.round(abs).toLocaleString() : '$'+abs.toFixed(2);
  return v<0?'-'+s:s;
};
const fmtFull = v => {
  if (!v&&v!==0) return '—';
  const abs=Math.abs(v);
  const s = '$'+abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return v<0?'-'+s:s;
};
const mLabel = m => MNAMES[+m.split('-')[1]-1];
const mLabelFull = m => { const [y,mo]=m.split('-'); return MNAMES[+mo-1]+' '+y; };

const months   = [...new Set(rows.map(r=>r.month))].sort();
const years    = [...new Set(months.map(m=>m.split('-')[0]))].sort();
const allCats  = [...new Set(rows.map(r=>r.category))].sort();
const mainCats = allCats.filter(c=>!GROUPED.has(c));

// Aggregate
const agg = {};
rows.forEach(r=>{
  const k=r.month+'|'+r.category;
  if(!agg[k]) agg[k]={paid:0,proj:0};
  if(r.projected) agg[k].proj+=r.amount; else agg[k].paid+=r.amount;
});

const sumCatMs = (cat,ms) => {
  let paid=0,proj=0;
  ms.forEach(m=>{ const d=agg[m+'|'+cat]||{paid:0,proj:0}; paid+=d.paid; proj+=d.proj; });
  return {paid,proj};
};
const sumFilterMs = (filterFn, ms) => {
  let paid=0,proj=0;
  rows.filter(r=>ms.includes(r.month)&&filterFn(r)).forEach(r=>{ if(r.projected) proj+=r.amount; else paid+=r.amount; });
  return {paid,proj};
};

const getQtrs  = yr=>[...new Set(months.filter(m=>m.startsWith(yr)).map(QTR))].sort();
const getQMths = (yr,q)=>months.filter(m=>m.startsWith(yr)&&QTR(m)===q);

const collapsedYears={}, collapsedQtrs={};
years.forEach(y=>collapsedYears[y]=false);
months.forEach(m=>{ collapsedQtrs[m.split('-')[0]+'|'+QTR(m)]=false; });

let viewMode='months';

// ── Cell renderer ────────────────────────────────────────────────────────────
const cellHtml = (paid,proj) => {
  if(paid===0&&proj===0) return '<span class="v-zero">—</span>';
  if(paid!==0&&proj===0) return `<span class="${paid<0?'v-neg':'v-paid'}">${fmt(paid)}</span>`;
  if(paid===0&&proj!==0) return `<span class="v-proj">${fmt(proj)}</span>`;
  return `<span class="${paid<0?'v-neg':'v-paid'}">${fmt(paid)}</span><br><span class="v-proj" style="font-size:10px;">${fmt(proj)}</span>`;
};

// ── Build table ───────────────────────────────────────────────────────────────
function buildTable() {
  const qOnly = viewMode==='quarters';
  const tbl = document.getElementById('pv');
  const hdrRows = qOnly?2:3;

  // Compute visible columns
  const visCols = [];
  years.forEach(yr=>{
    if(collapsedYears[yr]){ visCols.push({type:'ytotal',yr,q:null,m:null}); return; }
    getQtrs(yr).forEach(q=>{
      const k=yr+'|'+q;
      if(!qOnly){
        if(collapsedQtrs[k]){ visCols.push({type:'qtotal',yr,q,m:null}); return; }
        getQMths(yr,q).forEach(m=>visCols.push({type:'month',yr,q,m}));
      }
      visCols.push({type:'qtotal',yr,q,m:null});
    });
    visCols.push({type:'ytotal',yr,q:null,m:null});
  });
  visCols.push({type:'grand',yr:null,q:null,m:null});

  // ── THEAD ────────────────────────────────────────────────────────────────
  let h='<thead>';

  // Row 1: years
  h+=`<tr><th class="row-hdr" rowspan="${hdrRows}">Category</th>`;
  years.forEach(yr=>{
    const isYC=collapsedYears[yr];
    const span=visCols.filter(c=>c.yr===yr).length;
    h+=`<th class="year-hdr${isYC?' is-collapsed':''}" colspan="${span||1}" data-yr="${yr}"><span class="toggle">&#9660;</span>${yr}</th>`;
  });
  h+='<th class="grand-hdr" rowspan="'+hdrRows+'">Grand<br>total</th></tr>';

  if(!qOnly){
    // Row 2: quarters
    h+='<tr>';
    years.forEach(yr=>{
      if(collapsedYears[yr]) return;
      getQtrs(yr).forEach(q=>{
        const k=yr+'|'+q; const isQC=collapsedQtrs[k];
        const span=isQC?1:getQMths(yr,q).length+1;
        h+=`<th class="qtr-hdr${isQC?' is-collapsed':''}" colspan="${span}" data-yr="${yr}" data-q="${q}"><span class="toggle">&#9660;</span>${q}</th>`;
      });
      h+=`<th class="ytotal-hdr">${yr} total</th>`;
    });
    h+='</tr>';
    // Row 3: months
    h+='<tr>';
    years.forEach(yr=>{
      if(collapsedYears[yr]) return;
      getQtrs(yr).forEach(q=>{
        const k=yr+'|'+q; if(collapsedQtrs[k]) return;
        getQMths(yr,q).forEach(m=>h+=`<th class="month-hdr">${mLabel(m)}</th>`);
        h+=`<th class="qtotal-hdr">${q} total</th>`;
      });
      h+=`<th class="ytotal-hdr"></th>`;
    });
    h+='</tr>';
  } else {
    // Row 2 (quarters only): quarter labels
    h+='<tr>';
    years.forEach(yr=>{
      if(collapsedYears[yr]) return;
      getQtrs(yr).forEach(q=>h+=`<th class="qtotal-hdr" style="border-left:2px solid #bbb;">${q}</th>`);
      h+=`<th class="ytotal-hdr">${yr} total</th>`;
    });
    h+='</tr>';
  }
  h+='</thead>';

  // ── TBODY ────────────────────────────────────────────────────────────────
  const getCatMs = (cat,col) => {
    let ms;
    if(col.type==='month') ms=[col.m];
    else if(col.type==='qtotal') ms=getQMths(col.yr,col.q);
    else if(col.type==='ytotal') ms=months.filter(m=>m.startsWith(col.yr));
    else ms=months;
    return sumCatMs(cat,ms);
  };
  const getFilterMs = (fn,col) => {
    let ms;
    if(col.type==='month') ms=[col.m];
    else if(col.type==='qtotal') ms=getQMths(col.yr,col.q);
    else if(col.type==='ytotal') ms=months.filter(m=>m.startsWith(col.yr));
    else ms=months;
    return sumFilterMs(fn,ms);
  };

  const colCls = (col,isFirst) => {
    if(col.type==='grand') return 'grand-col';
    if(col.type==='ytotal') return 'ytotal-col';
    if(col.type==='qtotal') return 'qtotal-col';
    if(isFirst||col.type==='month') {
      // first month in a year or first qtr
      const prevIdx = visCols.indexOf(col)-1;
      if(prevIdx<0) return 'year-first';
      const prev=visCols[prevIdx];
      if(!prev||prev.yr!==col.yr) return 'year-first';
      if(prev.yr===col.yr&&prev.q!==col.q) return 'qtr-first';
      return 'month-col';
    }
    return '';
  };

  const makeDataRow = (label, catOrFn, rowClass, stripe, drillCats, drillMs) => {
    const isSubRow = rowClass==='subtotal'||rowClass==='grpsub'||rowClass==='grandtotal';
    const isCat = typeof catOrFn==='string';
    let row = `<tr class="${rowClass||'data-row'}${stripe&&!isSubRow?' stripe':''}">`;
    // Label cell with drill data
    const drillData = JSON.stringify({cats: drillCats||[], months: drillMs||[]}).replace(/"/g,'&quot;');
    if(!isSubRow){
      row+=`<td onclick='openDrawer(${drillData},"${label.replace(/'/g,'\\\'').replace(/&amp;/g,'&')}")' style="cursor:pointer;" title="Click to see transactions">${label} <span style="color:#aaa;font-size:10px;">&#9654;</span></td>`;
    } else {
      row+=`<td>${label}</td>`;
    }
    let firstData=true;
    visCols.forEach((col,i)=>{
      if(col.type==='grand') return; // handled after
      const {paid,proj} = isCat ? getCatMs(catOrFn,col) : getFilterMs(catOrFn,col);
      const cc = colCls(col,firstData); firstData=false;
      // For data rows, make cell clickable for drill-down
      let colMs;
      if(col.type==='month') colMs=[col.m];
      else if(col.type==='qtotal') colMs=getQMths(col.yr,col.q);
      else if(col.type==='ytotal') colMs=months.filter(m=>m.startsWith(col.yr));
      const cellDrillData = JSON.stringify({cats: drillCats||[], months: colMs||[]}).replace(/"/g,'&quot;');
      const clickable = !isSubRow&&(paid!==0||proj!==0);
      row+=`<td class="${cc}"${clickable?` onclick='openDrawer(${cellDrillData},"${label.replace(/'/g,'\\\'').replace(/&amp;/g,'&')}")' style="cursor:pointer;"`:''}>`;
      row+=cellHtml(paid,proj)+'</td>';
    });
    // Grand col
    const {paid:gp,proj:gpr} = isCat ? getCatMs(catOrFn,{type:'grand'}) : getFilterMs(catOrFn,{type:'grand'});
    const grandMs = months;
    const grandDrill = JSON.stringify({cats: drillCats||[], months: grandMs}).replace(/"/g,'&quot;');
    const clickableGrand = !isSubRow&&(gp!==0||gpr!==0);
    row+=`<td class="grand-col"${clickableGrand?` onclick='openDrawer(${grandDrill},"${label.replace(/'/g,'\\\'').replace(/&amp;/g,'&')}")' style="cursor:pointer;"`:''}>`;
    row+=cellHtml(gp,gpr)+'</td>';
    row+='</tr>';
    return row;
  };

  const totalCols = visCols.length;
  let b='<tbody>';
  let stripe=false;
  mainCats.forEach(cat=>{
    const has=months.some(m=>{const d=agg[m+'|'+cat];return d&&(d.paid||d.proj);});
    if(!has) return;
    b+=makeDataRow(cat, cat, '', stripe, [cat], months);
    stripe=!stripe;
  });
  b+=makeDataRow('Subtotal', r=>!GROUPED.has(r.category), 'subtotal', false, mainCats, months);
  b+=`<tr class="grp-header"><td colspan="${totalCols+1}">Construction &amp; Lease Payments</td></tr>`;
  b+=makeDataRow(GC_LABEL, GC_CAT, '', false, [GC_CAT], months);
  b+=makeDataRow(STORE_LABEL, STORE_CAT, '', true, [STORE_CAT], months);
  b+=makeDataRow(GRPSUB_LBL, r=>GROUPED.has(r.category), 'grpsub', false, [GC_CAT, STORE_CAT], months);
  b+=makeDataRow('Grand Total', ()=>true, 'grandtotal', false, allCats, months);
  b+='</tbody>';

  tbl.innerHTML = h+b;

  // Attach year/quarter collapse listeners
  tbl.querySelectorAll('th.year-hdr').forEach(th=>{
    th.addEventListener('click',()=>{ collapsedYears[th.dataset.yr]=!collapsedYears[th.dataset.yr]; buildTable(); });
  });
  tbl.querySelectorAll('th.qtr-hdr').forEach(th=>{
    th.addEventListener('click',()=>{ const k=th.dataset.yr+'|'+th.dataset.q; collapsedQtrs[k]=!collapsedQtrs[k]; buildTable(); });
  });
}

// ── Drill-down drawer ─────────────────────────────────────────────────────────
function openDrawer(drillData, label) {
  const {cats, months: ms} = drillData;
  const catSet = new Set(cats.map(c=>normCat(c)));
  const msSet  = new Set(ms);

  const matching = rows.filter(r=>catSet.has(r.category)&&msSet.has(r.month));
  if(!matching.length) return;

  const total = matching.reduce((s,r)=>s+r.amount, 0);
  const periodLabel = ms.length===1 ? mLabelFull(ms[0]) : ms.length<=3 ? ms.map(mLabelFull).join(', ') : mLabelFull(ms[0])+' – '+mLabelFull(ms[ms.length-1]);

  document.getElementById('drawer-title').textContent = label;
  document.getElementById('drawer-sub').textContent = periodLabel;
  document.getElementById('drawer-total').textContent = 'Total: ' + fmtFull(total);

  const tbody = document.getElementById('drawer-body');
  if(!matching.length){
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No transactions found</td></tr>';
  } else {
    const sorted = [...matching].sort((a,b)=>a.month.localeCompare(b.month));
    tbody.innerHTML = sorted.map(r=>{
      const badge = r.projected
        ? '<span class="badge-proj">Projected</span>'
        : '<span class="badge-paid">Paid</span>';
      const amtCls = r.amount<0?'detail-neg':'detail-pos';
      const datePaid = r.date_paid || '—';
      return `<tr>
        <td>${r.vendor}</td>
        <td style="color:#666;">${r.category}</td>
        <td style="color:#666;">${r.invoice_date}</td>
        <td style="color:#666;">${datePaid}</td>
        <td>${badge}</td>
        <td class="${amtCls}">${fmtFull(r.amount)}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDrawer(e) {
  if(e&&e.target!==document.getElementById('overlay')&&e.type==='click') return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });

function setView(mode, btn) {
  viewMode=mode;
  document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildTable();
}
function expandAll()  { years.forEach(y=>{ collapsedYears[y]=false; Object.keys(collapsedQtrs).filter(k=>k.startsWith(y)).forEach(k=>collapsedQtrs[k]=false); }); buildTable(); }
function collapseAll(){ years.forEach(y=>{ collapsedYears[y]=true;  Object.keys(collapsedQtrs).filter(k=>k.startsWith(y)).forEach(k=>collapsedQtrs[k]=true);  }); buildTable(); }

buildTable();
</script>
